<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>The layout engine's maximize/strip/restore cycle: the FX dock's Live Rates panel maximizes to fill the workspace while Analytics, Positions and Blotter glide into thin strips, then restores to the normal four-panel dock.</title>

  <!-- ======== canvas ======== -->
  <rect x="2" y="2" width="716" height="456" rx="14" fill="#0a1420" stroke="#173049" stroke-width="2"/>

  <style>
    .title { fill:#8fefff; font-size:15px; font-weight:700; letter-spacing:0.02em; }
    .phase { fill:#4dd8f0; font-size:13px; font-weight:700; letter-spacing:0.14em; }
    .panel-body { fill:#101b2d; stroke:#1c4a5e; stroke-width:1.25; }
    .panel-head { fill:#123246; stroke:#2a6a82; stroke-width:1.25; }
    .panel-head-main { fill:#0f3a52; stroke:#00c2dd; }
    .label { fill:#eafcff; font-size:12px; font-weight:700; letter-spacing:0.12em; }
    .label-strip { fill:#eafcff; font-size:10.5px; font-weight:700; letter-spacing:0.14em; }
    .deco { stroke:#2a6a82; stroke-width:1.5; opacity:0.55; }
  </style>

  <text x="20" y="24" class="title">Layout engine: maximize / strip / restore (loops)</text>

  <text x="700" y="24" text-anchor="end" class="phase" opacity="0">MAXIMIZE
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.15;0.17;0.33;0.35;1"/>
  </text>
  <text x="700" y="24" text-anchor="end" class="phase" opacity="0">STRIPS
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.35;0.37;0.63;0.65;1"/>
  </text>
  <text x="700" y="24" text-anchor="end" class="phase" opacity="0">RESTORE
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.65;0.67;0.83;0.85;1"/>
  </text>

  <!-- ======== main: fx-rates / LIVE RATES ======== -->
  <g>
    <rect class="panel-body" rx="5">
      <animate attributeName="x" dur="12s" repeatCount="indefinite" values="20;20;20;20;20;20" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="40;40;40;40;40;40" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="width" dur="12s" repeatCount="indefinite" values="408;408;648;648;408;408" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="320;320;368;368;320;320" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <rect class="panel-head panel-head-main" rx="5">
      <animate attributeName="x" dur="12s" repeatCount="indefinite" values="20;20;20;20;20;20" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="40;40;40;40;40;40" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="width" dur="12s" repeatCount="indefinite" values="408;408;648;648;408;408" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="22;22;22;22;22;22" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <text x="32" y="56" class="label">LIVE RATES</text>
    <line class="deco" x1="32" y1="82" x2="384" y2="82"/>
    <line class="deco" x1="32" y1="106" x2="384" y2="106"/>
    <line class="deco" x1="32" y1="130" x2="384" y2="130"/>
    <line class="deco" x1="32" y1="154" x2="300" y2="154"/>
  </g>

  <!-- ======== rail top: fx-analytics / ANALYTICS ======== -->
  <g>
    <rect class="panel-body" rx="5">
      <animate attributeName="x" dur="12s" repeatCount="indefinite" values="428;428;668;668;428;428" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="40;40;40;40;40;40" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="width" dur="12s" repeatCount="indefinite" values="272;272;32;32;272;272" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="160;160;184;184;160;160" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <rect class="panel-head" rx="5">
      <animate attributeName="x" dur="12s" repeatCount="indefinite" values="428;428;668;668;428;428" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="40;40;40;40;40;40" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="width" dur="12s" repeatCount="indefinite" values="272;272;32;32;272;272" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="22;22;184;184;22;22" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <text x="440" y="56" class="label" opacity="1">ANALYTICS
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="1;1;0;0;0;0;1;1" keyTimes="0;0.15;0.17;0.35;0.65;0.85;0.87;1"/>
    </text>
    <text x="684" y="132" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90,684,132)" class="label-strip" opacity="0">ANALYTICS
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;0;1;1;0;0;0" keyTimes="0;0.15;0.32;0.35;0.65;0.68;0.85;1"/>
    </text>
  </g>

  <!-- ======== rail bottom: fx-positions / POSITIONS ======== -->
  <g>
    <rect class="panel-body" rx="5">
      <animate attributeName="x" dur="12s" repeatCount="indefinite" values="428;428;668;668;428;428" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="200;200;224;224;200;200" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="width" dur="12s" repeatCount="indefinite" values="272;272;32;32;272;272" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="160;160;184;184;160;160" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <rect class="panel-head" rx="5">
      <animate attributeName="x" dur="12s" repeatCount="indefinite" values="428;428;668;668;428;428" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="200;200;224;224;200;200" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="width" dur="12s" repeatCount="indefinite" values="272;272;32;32;272;272" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="22;22;184;184;22;22" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <text x="440" y="216" class="label" opacity="1">POSITIONS
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="1;1;0;0;0;0;1;1" keyTimes="0;0.15;0.17;0.35;0.65;0.85;0.87;1"/>
    </text>
    <text x="684" y="316" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90,684,316)" class="label-strip" opacity="0">POSITIONS
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;0;1;1;0;0;0" keyTimes="0;0.15;0.32;0.35;0.65;0.68;0.85;1"/>
    </text>
  </g>

  <!-- ======== bottom: fx-blotter / BLOTTER ======== -->
  <g>
    <rect class="panel-body" rx="5" x="20" width="680">
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="360;360;408;408;360;360" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="80;80;32;32;80;80" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <rect class="panel-head" rx="5" x="20" width="680">
      <animate attributeName="y" dur="12s" repeatCount="indefinite" values="360;360;408;408;360;360" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
      <animate attributeName="height" dur="12s" repeatCount="indefinite" values="22;22;32;32;22;22" keyTimes="0;0.15;0.35;0.65;0.85;1"/>
    </rect>
    <text x="32" y="376" class="label" opacity="1">BLOTTER
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="1;1;0;0;0;0;1;1" keyTimes="0;0.15;0.17;0.35;0.65;0.85;0.87;1"/>
    </text>
    <text x="360" y="428" text-anchor="middle" class="label-strip" opacity="0">BLOTTER
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;0;1;1;0;0;0" keyTimes="0;0.15;0.32;0.35;0.65;0.68;0.85;1"/>
    </text>
  </g>
</svg>
