<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <title>Render granularity: one tick in price$(EURUSD) re-renders only the tile subscribed to that symbol; the other tiles never see it.</title>

  <rect x="0" y="0" width="780" height="320" rx="12" fill="#0d1117"/>
  <text x="20" y="30" fill="#e6edf3" font-size="15" font-weight="bold" font-family="ui-sans-serif, system-ui, sans-serif">The presenter decides who re-renders</text>
  <text x="20" y="48" fill="#8b949e" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">One tick in price$(EURUSD) reaches exactly the components that called usePrice(EURUSD). No memoization needed.</text>

  <!-- presenter box -->
  <rect x="20" y="130" width="200" height="64" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="157" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="bold">PriceStreamPresenter</text>
  <text x="120" y="175" fill="#8b949e" font-size="10" text-anchor="middle">price$(EURUSD) · pure RxJS</text>

  <!-- seam label -->
  <text x="390" y="98" fill="#bc8cff" font-size="10" text-anchor="middle">usePrice = bind(pair → price$(pair))</text>
  <text x="390" y="112" fill="#8b949e" font-size="9" text-anchor="middle">@rtc/react-bindings</text>

  <!-- tiles -->
  <g>
    <rect x="570" y="60" width="190" height="60" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5">
      <animate attributeName="stroke" values="#58a6ff;#58a6ff;#3fb950;#58a6ff;#58a6ff" keyTimes="0;0.4;0.5;0.65;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="570" y="60" width="190" height="60" rx="8" fill="#3fb950">
      <animate attributeName="opacity" values="0;0;0.22;0;0" keyTimes="0;0.4;0.47;0.6;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="665" y="86" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="bold">EUR/USD tile</text>
    <text x="665" y="104" fill="#8b949e" font-size="10" text-anchor="middle">
      re-renders
      <animate attributeName="fill" values="#8b949e;#8b949e;#3fb950;#8b949e;#8b949e" keyTimes="0;0.4;0.5;0.65;1" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>
  <rect x="570" y="140" width="190" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="665" y="174" fill="#8b949e" font-size="11" text-anchor="middle">GBP/USD · idle</text>
  <rect x="570" y="220" width="190" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="665" y="254" fill="#8b949e" font-size="11" text-anchor="middle">USD/JPY · idle</text>

  <!-- flow line -->
  <path d="M 220 162 C 400 162 430 90 570 90" stroke="#30363d" stroke-width="1.2" fill="none"/>

  <!-- moving tick -->
  <circle r="6" fill="#d29922" opacity="0">
    <animateMotion dur="4s" repeatCount="indefinite" calcMode="linear"
      path="M 220 162 C 400 162 430 90 570 90"
      keyPoints="0;0;1;1" keyTimes="0;0.08;0.4;1"/>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.08;0.1;0.38;0.4;1"/>
  </circle>

  <text x="390" y="305" fill="#8b949e" font-size="10" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif">The RxJS graph drives updates; React repaints downstream. The idle tiles never receive the emission at all.</text>
</svg>
