<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <title>The credit RFQ quote race: three dealer quotes start pendingWithoutPrice; two price in while the third passes; the trader then accepts one, which turns green (accepted) while the other priced quote turns red (rejectedWithPrice).</title>

  <!-- ======== canvas ======== -->
  <rect x="0" y="0" width="900" height="340" rx="12" fill="#0d1117"/>
  <text x="24" y="34" fill="#e6edf3" font-size="17" font-weight="bold" font-family="ui-sans-serif, system-ui, sans-serif">The credit RFQ quote race</text>
  <text x="24" y="54" fill="#8b949e" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif">Three dealers, one RFQ — each quote runs its own state machine (§5.2) until the trader accepts one.</text>

  <!-- ======== RFQ box ======== -->
  <rect x="24" y="90" width="150" height="70" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="99" y="118" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="bold">RFQ #1042</text>
  <text x="99" y="135" fill="#8b949e" font-size="10" text-anchor="middle">CreditRfqSimulator</text>
  <text x="99" y="149" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="bold">
    Open
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      values="1;1;0;0" keyTimes="0;0.68;0.69;1"/>
  </text>
  <text x="99" y="149" fill="#8b949e" font-size="10" text-anchor="middle" font-weight="bold" opacity="0">
    Closed
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      values="0;0;1;1" keyTimes="0;0.69;0.70;1"/>
  </text>

  <!-- ======== lane labels ======== -->
  <g fill="#8b949e" font-size="10" font-weight="bold">
    <text x="210" y="105">Dealer A</text>
    <text x="210" y="185">Dealer B</text>
    <text x="210" y="265">Dealer C</text>
  </g>

  <!-- connector lines RFQ -> lanes -->
  <g stroke="#30363d" stroke-width="1.2" fill="none">
    <path d="M 174 110 C 195 110 195 100 210 96"/>
    <path d="M 174 125 C 195 125 195 180 210 176"/>
    <path d="M 174 140 C 195 140 195 260 210 256"/>
  </g>

  <!-- ======== Dealer A: pendingWithoutPrice -> pendingWithPrice -> accepted ======== -->
  <g>
    <rect x="210" y="76" width="180" height="40" rx="8" fill="#30363d" stroke="#8b949e" stroke-width="1.5">
      <animate attributeName="fill" dur="12s" repeatCount="indefinite"
        values="#30363d;#30363d;#1f6feb;#1f6feb;#238636;#238636" keyTimes="0;0.25;0.27;0.58;0.60;1"/>
      <animate attributeName="stroke" dur="12s" repeatCount="indefinite"
        values="#8b949e;#8b949e;#79c0ff;#79c0ff;#56d364;#56d364" keyTimes="0;0.25;0.27;0.58;0.60;1"/>
    </rect>
    <text x="300" y="100" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">
      <tspan>pendingWithoutPrice</tspan>
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.25;0.26;1"/>
    </text>
    <text x="300" y="100" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold" opacity="0">
      pendingWithPrice — 1.2044
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.26;0.27;0.58;0.59;1"/>
    </text>
    <text x="300" y="100" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold" opacity="0">
      accepted ✓
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.59;0.60;1"/>
    </text>
  </g>

  <!-- ======== Dealer B: pendingWithoutPrice -> pendingWithPrice -> rejectedWithPrice ======== -->
  <g>
    <rect x="210" y="156" width="180" height="40" rx="8" fill="#30363d" stroke="#8b949e" stroke-width="1.5">
      <animate attributeName="fill" dur="12s" repeatCount="indefinite"
        values="#30363d;#30363d;#1f6feb;#1f6feb;#8b2331;#8b2331" keyTimes="0;0.33;0.35;0.58;0.60;1"/>
      <animate attributeName="stroke" dur="12s" repeatCount="indefinite"
        values="#8b949e;#8b949e;#79c0ff;#79c0ff;#f85149;#f85149" keyTimes="0;0.33;0.35;0.58;0.60;1"/>
    </rect>
    <text x="300" y="180" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">
      <tspan>pendingWithoutPrice</tspan>
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.33;0.34;1"/>
    </text>
    <text x="300" y="180" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold" opacity="0">
      pendingWithPrice — 1.2041
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.34;0.35;0.58;0.59;1"/>
    </text>
    <text x="300" y="180" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold" opacity="0">
      rejectedWithPrice ✗
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.59;0.60;1"/>
    </text>
  </g>

  <!-- ======== Dealer C: pendingWithoutPrice -> passed ======== -->
  <g>
    <rect x="210" y="236" width="180" height="40" rx="8" fill="#30363d" stroke="#8b949e" stroke-width="1.5">
      <animate attributeName="fill" dur="12s" repeatCount="indefinite"
        values="#30363d;#30363d;#6e5019;#6e5019" keyTimes="0;0.45;0.47;1"/>
      <animate attributeName="stroke" dur="12s" repeatCount="indefinite"
        values="#8b949e;#8b949e;#e3b341;#e3b341" keyTimes="0;0.45;0.47;1"/>
    </rect>
    <text x="300" y="260" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">
      <tspan>pendingWithoutPrice</tspan>
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.45;0.46;1"/>
    </text>
    <text x="300" y="260" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold" opacity="0">
      passed
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.46;0.47;1"/>
    </text>
  </g>

  <!-- ======== event dots travelling RFQ -> RfqsPresenter -> Tiles ======== -->
  <g fill="#8b949e" font-size="9">
    <text x="500" y="60" font-weight="bold" fill="#e6edf3">RfqsPresenter.rfqs$ / quotesForRfq$</text>
    <text x="500" y="74">workflow.events() → WorkflowEventStreamUseCase → RfqCard / RfqsPanel</text>
  </g>
  <rect x="420" y="90" width="150" height="46" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="495" y="110" fill="#e6edf3" font-size="11" text-anchor="middle">RfqsPresenter</text>
  <text x="495" y="124" fill="#8b949e" font-size="9" text-anchor="middle">@rtc/client-core</text>

  <rect x="620" y="90" width="150" height="46" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="695" y="110" fill="#e6edf3" font-size="11" text-anchor="middle">RfqsPanel / RfqCard</text>
  <text x="695" y="124" fill="#8b949e" font-size="9" text-anchor="middle">@rtc/client-react</text>

  <g stroke="#30363d" stroke-width="1.2" fill="none">
    <path d="M 390 96 C 405 96 405 113 420 113"/>
    <path d="M 390 176 C 405 176 405 113 420 113"/>
    <path d="M 390 256 C 405 256 405 113 420 113"/>
    <path d="M 570 113 L 620 113"/>
  </g>

  <!-- traveling dots: one per quoteQuoted / quoteAccepted / quoteRejected event -->
  <circle r="5" fill="#1f6feb" opacity="0">
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear"
      path="M 390 96 C 405 96 405 113 495 113 L 695 113" keyPoints="0;0;1;1" keyTimes="0;0.26;0.32;1"/>
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.26;0.27;0.31;0.32;1"/>
  </circle>
  <circle r="5" fill="#1f6feb" opacity="0">
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear"
      path="M 390 176 C 405 176 405 113 495 113 L 695 113" keyPoints="0;0;1;1" keyTimes="0;0.34;0.40;1"/>
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.34;0.35;0.39;0.40;1"/>
  </circle>
  <circle r="5" fill="#e3b341" opacity="0">
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear"
      path="M 390 256 C 405 256 405 113 495 113 L 695 113" keyPoints="0;0;1;1" keyTimes="0;0.46;0.52;1"/>
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.46;0.47;0.51;0.52;1"/>
  </circle>
  <circle r="6" fill="#3fb950" opacity="0">
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear"
      path="M 390 96 C 405 96 405 113 495 113 L 695 113" keyPoints="0;0;1;1" keyTimes="0;0.60;0.68;1"/>
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.60;0.61;0.67;0.68;1"/>
  </circle>
  <circle r="6" fill="#f85149" opacity="0">
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear"
      path="M 390 176 C 405 176 405 113 495 113 L 695 113" keyPoints="0;0;1;1" keyTimes="0;0.60;0.68;1"/>
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.60;0.61;0.67;0.68;1"/>
  </circle>

  <!-- ======== timeline caption ======== -->
  <text x="24" y="310" fill="#8b949e" font-size="9">t=0 rfqCreated + 3× quoteCreated (pendingWithoutPrice)</text>
  <text x="24" y="324" fill="#8b949e" font-size="9">t≈3-6s A and B quote (quoteQuoted); C passes at t≈5.5s — t≈7s trader accepts A (quoteAccepted → quoteRejected for B → rfqClosed)</text>
</svg>
