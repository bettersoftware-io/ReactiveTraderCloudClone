packages:
  - "packages/*"
  - "tests"
# Install-script allowlist (pnpm 11 strictDepBuilds): pnpm blocks dependency
# lifecycle scripts by default; only the packages set to `true` here may execute
# code at install time. Both are trusted build/test tooling that need native
# binaries — esbuild (the bundler under vite/vitest/tsx) and cypress (e2e runner).
allowBuilds:
  cypress: true
  esbuild: true

# Supply-chain cooldown: refuse to install any package version published fewer
# than this many minutes ago (1440 = 24h). This is pnpm 11's default, pinned
# explicitly so the policy is visible in-repo and survives any future change to
# the default. Add packages to `minimumReleaseAgeExclude` to bypass per-package.
minimumReleaseAge: 1440

# Force the vulnerable transitive ws (7.4.6, pulled in by @marblejs/websockets,
# which declares `ws: ~7.4.6`) up to the patched 7.5.10 — fixes GHSA-3h5v-q93c-6h6q
# (DoS) while keeping marblejs on its DECLARED ws 7.x major, without disturbing the
# server's direct ws@8. (pnpm 11 reads overrides here, not from package.json.)
# NOTE: do not let Renovate bump this to ^8 — that forces marblejs onto an
# undeclared ws major. A packageRule in .github/renovate.json5 pins this override.
overrides:
  ws@7: ^7.5.10
  # Force the dev-only transitive uuid 11.0.x (11.0.5 -> 11.1.1, medium alert).
  # Verified REQUIRED: removing this override re-resolves uuid back to the
  # vulnerable 11.0.5 (its declaring dep pins the 11.0.x line, so 11.1.1 is not
  # reachable by natural resolution or a parent bump — only by forcing the minor
  # bump here). Scoped to `uuid@11` so the older majors legitimately pinned
  # elsewhere — uuid@7 (@marblejs/core), uuid@8, uuid@13 — are untouched.
  # (form-data needed no override: @cypress/request declares form-data ~4.0.4,
  # which already permits the patched 4.0.6, so it resolves naturally.)
  uuid@11: ^11.1.1
  # Force the dev-only transitive serialize-javascript (6.0.2, pulled in by
  # mocha, itself under @badeball/cypress-cucumber-preprocessor) up to the
  # patched 7.0.3+ — fixes the RCE GHSA-5c6j-r48x-rmvq (high) and the related
  # GHSA-qj8w-gfj5-8c6v (moderate). Dependabot CANNOT fix this by version bump:
  # the preprocessor is already latest (24.0.1) and even latest mocha (11.7.6)
  # still declares serialize-javascript ^6.0.2, so an override is the only path.
  serialize-javascript: ^7.0.3
