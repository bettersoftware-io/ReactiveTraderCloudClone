packages:
  - "packages/*"
  - "tests"
# Install-script allowlist (pnpm 11 strictDepBuilds): pnpm blocks dependency
# lifecycle scripts by default; only the packages set to `true` here may execute
# code at install time. All three are trusted build/test tooling that need
# native binaries — esbuild (the bundler under vite/vitest/tsx), cypress (e2e
# runner), and @shopify/react-native-skia (its postinstall fetches Skia's
# prebuilt native libs, required for the native iOS/Android build later).
allowBuilds:
  '@shopify/react-native-skia': true
  cypress: true
  esbuild: true

# Supply-chain cooldown: refuse to install any package version published fewer
# than this many minutes ago (1440 = 24h). This is pnpm 11's default, pinned
# explicitly so the policy is visible in-repo and survives any future change to
# the default. Add packages to `minimumReleaseAgeExclude` to bypass per-package.
minimumReleaseAge: 1440

overrides:
  # Force the dev-only transitive uuid 11.0.x (11.0.5 -> 11.1.1, medium alert).
  # Verified REQUIRED: removing this override re-resolves uuid back to the
  # vulnerable 11.0.5 (its declaring dep pins the 11.0.x line, so 11.1.1 is not
  # reachable by natural resolution or a parent bump — only by forcing the minor
  # bump here). Scoped to `uuid@11` so the older majors legitimately pinned
  # elsewhere — uuid@7 (@marblejs/core), uuid@8, uuid@13 — are untouched.
  # (form-data needed no override: @cypress/request declares form-data ~4.0.4,
  # which already permits the patched 4.0.6, so it resolves naturally.)
  uuid@11: ^11.1.1
  # Force the dev-only transitive serialize-javascript (6.0.2, pulled in by
  # mocha, itself under @badeball/cypress-cucumber-preprocessor) up to the
  # patched 7.0.3+ — fixes the RCE GHSA-5c6j-r48x-rmvq (high) and the related
  # GHSA-qj8w-gfj5-8c6v (moderate). Dependabot CANNOT fix this by version bump:
  # the preprocessor is already latest (24.0.1) and even latest mocha (11.7.6)
  # still declares serialize-javascript ^6.0.2, so an override is the only path.
  serialize-javascript: ^7.0.3
  # Force the transitive @xmldom/xmldom (pulled in by @expo/plist and plist —
  # Expo native-build tooling, exercised by `expo prebuild`/`run:ios` and every
  # `eas build`) up from the vulnerable <0.8.13 line to the PATCHED 0.8.13.
  # SCOPED to the vulnerable range (like uuid@11 above) so a future consumer
  # resolving an already-safe xmldom (>=0.8.13) is never forced off its choice.
  # Fixes 5 high XML-injection GHSA advisories (GHSA-wh4c-j3r5-mjhp,
  # GHSA-2v35-w6hq-6mfw, +3 related, all <0.8.13) — 0.8.13 is the minimal
  # version that patches every one of them.
  # NOTE — DO NOT bump this to 0.9.x. xmldom 0.9.0 made the `mimeType` argument
  # of `DOMParser.parseFromString` REQUIRED, but @expo/plist@0.8.0 still calls it
  # one-arg — so 0.9.x throws `mimeType "undefined" is not valid` inside the iOS
  # infoPlist base-mod during prebuild, breaking `expo run:ios` and all EAS
  # native builds. (A prior override pinned ^0.9.10 on the assumption the native
  # path was never exercised; the SDK-57 native-build work proved that wrong.)
  # 0.8.13 keeps the pre-0.9 one-arg DOMParser API @expo/plist depends on.
  "@xmldom/xmldom@<0.8.13": ^0.8.13
  # Pin @expo/metro-runtime to the SDK-57 line. It arrives as a PEER dep via
  # `expo`'s loose `*` range, and the minimumReleaseAge cooldown above steered
  # pnpm to the aged 4.0.1 (SDK-52 era) instead of the 57.0.3 that expo-router
  # actually requires and expo's bundledNativeModules pins for SDK 57.
  # 4.0.1 is fatal on RN 0.86: its messageSocket.native.ts calls
  # `require("react-native/.../getDevServer")()` expecting the OLD CJS contract
  # (module.exports = fn), but RN 0.86 ships getDevServer as an ESM
  # `export default`, so the require yields the namespace object → the app
  # crashes at boot with `TypeError: getDevServer is not a function (it is
  # Object)`. 57.0.3 removed that broken consumer entirely and uses a proper
  # ESM import, matching RN 0.86 by construction. Without this override the
  # peer re-resolves to 4.0.1 on every install.
  "@expo/metro-runtime": ~57.0.3
  # react-native-reanimated@4.5.0 + react-native-worklets: two overrides keep
  # the RN native Metro bundle compiling. Neither failure is visible to the
  # jest/vitest suite — worklets is disabled under jest and Metro is never run;
  # the CI `expo export` step (ci.yml) is the only exerciser.
  #
  # (1) VERSION: pin worklets to the SDK-57-blessed 0.10.0 that reanimated@4.5.0
  # was BUILT against (its own devDependency is react-native-worklets@0.10.0, and
  # expo's bundledNativeModules for SDK 57 pins 0.10.0). The worklets babel plugin
  # and the worklets runtime must be the SAME version or the transform emits code
  # the runtime mis-reads (`Cannot read properties of undefined (reading 'length')`
  # while transforming reanimated's own Easing.ts) — see the Reanimated
  # troubleshooting guide. reanimated peers `0.10.x`, so a natural install lets
  # pnpm float the peer to 0.10.1 (a MISMATCH vs the 0.10.0 plugin); force 0.10.0
  # everywhere so plugin == runtime == the tested pair.
  react-native-worklets: 0.10.0
  # (2) BABEL: worklets' nested babel transform (its @babel/preset-typescript@^7)
  # hard-asserts the caller's @babel/core is ^7, but worklets declares @babel/core
  # peer `*` so pnpm otherwise hands it the workspace-hoisted @babel/core@8.0.1
  # (pulled at ^8 by client-react/devtools-app for React Compiler) → throws
  # `Requires Babel "^7.0.0-0", but was loaded with "8.0.1"`. Scope @babel/core to
  # 7.29.7 INSIDE the worklets subtree only — the web packages keep @babel/core@8,
  # and syncpack is unaffected (an override is not a package.json dep). 7.29.7 is
  # already in the tree.
  "react-native-worklets>@babel/core": 7.29.7

# Force @babel/core@7 for the RN Metro babel toolchain. The main Metro transform
# runs through @expo/metro-config's babel-transformer, whose `require("@babel/core")`
# otherwise resolves the workspace-hoisted @babel/core@8.0.1 (pulled at ^8 by
# client-react/devtools-app for React Compiler). That made the MAIN pass Babel 8
# while worklets' nested pass ran the scoped Babel 7 above — cross-version AST
# mixing that crashed the x86 Metro bundle (`reading 'length'` in worklets'
# plugin on reanimated's Easing.ts; invisible to the jest/vitest suite and to
# arm64-local, only caught by CI's `expo export`). Giving @expo/metro-config its
# own @babel/core@7.29.7 makes the whole RN transform uniformly Babel 7.
# This is done via packageExtensions (NOT a client-react-native devDependency) so
# neither manypkg nor syncpack sees an @babel/core version split — the web packages
# keep @babel/core@8. @expo/metro-config is RN-only (web builds with Vite), so this
# cannot affect the web bundles.
packageExtensions:
  "@expo/metro-config":
    dependencies:
      "@babel/core": "7.29.7"
