name: e2e Gherkin (weekly)

# The PARKED Gherkin peers, kept as BDD showcases but off the PR gate:
#   - two browser peers (playwright-cucumber, react + solid)
#   - one presenter peer (cucumber-fake-timers) — Cucumber.js driving the live
#     presenters under @sinonjs/fake-timers, the presenter-tier twin of
#     playwright-cucumber (same runner, same specs/**/*.feature corpus).
# Native Playwright is the gating browser stack and vitest-fake-timers the
# gating presenter runner (see tests/STRATEGY.md §7 verdict); this weekly run
# keeps the .feature files + step trees from silently rotting while these peers
# remain in the repo as the BDD showcase.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

# Minimal token: both jobs only checkout, build, run tests, and upload artifacts
# — none write to the repo. (CodeQL actions/missing-workflow-permissions.)
permissions:
  contents: read

jobs:
  gherkin:
    name: playwright-cucumber (react + solid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
      - name: Enable Corepack
        run: npm install -g corepack@0.35.0 && corepack enable
      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium + OS deps
        run: pnpm --filter @rtc/tests exec playwright install --with-deps chromium
      - name: Build workspace libs
        run: pnpm build
      - name: playwright-cucumber (react)
        run: pnpm --filter @rtc/tests test:browser:playwright-cucumber
      - name: playwright-cucumber (solid)
        run: pnpm --filter @rtc/tests test:browser:playwright-cucumber:solid
      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gherkin-weekly-reports
          path: tests/reports/
          retention-days: 14

  # The presenter-tier BDD showcase — Cucumber.js over the live presenters, no
  # browser. Its own job so it skips the Playwright install the browser job needs.
  presenter:
    name: cucumber-fake-timers (presenter BDD showcase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
      - name: Enable Corepack
        run: npm install -g corepack@0.35.0 && corepack enable
      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace libs
        run: pnpm build
      - name: presenter cucumber-fake-timers
        run: pnpm --filter @rtc/tests test:presenter:cucumber-fake-timers
      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gherkin-weekly-presenter-reports
          path: tests/reports/
          retention-days: 14
