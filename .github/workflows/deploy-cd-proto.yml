name: Deploy Claude Design Prototype

# On-demand deploy of a standalone Claude Design prototype (the hand-authored
# HTML mockup under docs/design/<version>/standalone/) to the rtc-clone-cd-proto
# Vercel project (https://rtc-clone-cd-proto.vercel.app), behind a Basic-Auth gate.
# Separate from the main app's Deploy workflow AND from the "Deploy Prototype"
# workflow (which ships the @rtc/client-prototype React port) — this never
# auto-runs and touches only the cd-proto project. Run it from the Actions tab
# ("Run workflow", pick which prototype via the path input) or:
#   gh workflow run deploy-cd-proto.yml -f prototype_path="docs/design/v2/standalone/Reactive Trader.html"
on:
  workflow_dispatch:
    inputs:
      prototype_path:
        description: "Path to the standalone prototype HTML to deploy"
        required: true
        default: "docs/design/v3/standalone/Reactive Trader.html"

concurrency:
  group: deploy-cd-proto
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cd-proto:
    name: cd-proto → vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy chosen prototype (generate gate, copy HTML, deploy, smoke)
        # prototype_path is bound via env and passed as a quoted argument — never
        # interpolated into the script body — to avoid dispatch-input injection.
        env:
          SRC: ${{ inputs.prototype_path }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash deploy/cd-proto/deploy.sh "$SRC"
