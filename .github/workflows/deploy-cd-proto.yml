name: Deploy Claude Design Prototype

# On-demand deploy of a standalone Claude Design prototype (the hand-authored
# HTML mockups under docs/design/web/<version>/standalone/ and
# docs/design/mobile/<version>/standalone/) to one of two Vercel projects, each
# behind a Basic-Auth gate:
#   - target: web    → rtc-clone-web-cd-proto    (default; ships web v4 unless a path is given)
#   - target: mobile → rtc-clone-mobile-cd-proto (ships mobile v1 unless a path is given)
# Separate from the main app's Deploy workflow AND from the "Deploy Prototype"
# workflow (which ships the @rtc/client-prototype React port) — this never
# auto-runs and touches only the cd-proto projects. Run it from the Actions tab
# ("Run workflow", pick target + optional path) or:
#   gh workflow run deploy-cd-proto.yml -f target=mobile
#   gh workflow run deploy-cd-proto.yml -f prototype_path="docs/design/web/v3/standalone/Reactive Trader.html"
#
# The mobile target needs the repo secret VERCEL_CD_PROTO_MOBILE_PROJECT_ID
# (the rtc-clone-mobile-cd-proto project's prj_… id) — see deploy/cd-proto/README.md.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which cd-proto project to deploy to"
        type: choice
        options:
          - web
          - mobile
        default: web
      prototype_path:
        description: "Path to the standalone prototype HTML (blank = the target's default)"
        required: false
        default: ""

concurrency:
  group: deploy-cd-proto-${{ inputs.target }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cd-proto:
    name: cd-proto (${{ inputs.target }}) → vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Guard mobile project id
        if: ${{ inputs.target == 'mobile' }}
        env:
          PID: ${{ secrets.VERCEL_CD_PROTO_MOBILE_PROJECT_ID }}
        run: |
          if [ -z "$PID" ]; then
            echo "::error::VERCEL_CD_PROTO_MOBILE_PROJECT_ID is not set. Keep the rtc-clone-mobile-cd-proto project, then add its prj_… id as that repo secret." >&2
            exit 1
          fi

      - name: Resolve prototype path
        id: resolve
        env:
          TARGET: ${{ inputs.target }}
          RAW_PATH: ${{ inputs.prototype_path }}
        run: |
          if [ -n "$RAW_PATH" ]; then
            src="$RAW_PATH"
          elif [ "$TARGET" = "mobile" ]; then
            src="docs/design/mobile/v1/standalone/Reactive Trader Mobile.html"
          else
            src="docs/design/web/v4/standalone/Reactive Trader.html"
          fi
          printf 'src=%s\n' "$src" >> "$GITHUB_OUTPUT"

      - name: Deploy chosen prototype (generate gate, copy HTML, deploy, smoke)
        # The resolved path is bound via env and passed as a quoted argument —
        # never interpolated into the script body — to avoid dispatch-input
        # injection. VERCEL_PROJECT_ID comes from the target's project-id secret
        # (VERCEL_CD_PROTO_WEB_PROJECT_ID / _MOBILE_PROJECT_ID); if the web secret
        # is somehow unset, the empty string falls back to deploy.sh's hardcoded
        # web default. CD_PROTO_ALIAS selects which alias the smoke check hits.
        env:
          SRC: ${{ steps.resolve.outputs.src }}
          VERCEL_PROJECT_ID: ${{ inputs.target == 'mobile' && secrets.VERCEL_CD_PROTO_MOBILE_PROJECT_ID || secrets.VERCEL_CD_PROTO_WEB_PROJECT_ID }}
          CD_PROTO_ALIAS: ${{ inputs.target == 'mobile' && 'https://rtc-clone-mobile-cd-proto.vercel.app' || 'https://rtc-clone-web-cd-proto.vercel.app' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash deploy/cd-proto/deploy.sh "$SRC"
