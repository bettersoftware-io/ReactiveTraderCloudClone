name: Deploy Prototype

# On-demand deploy of a standalone design prototype to the rtc-clone-proto
# Vercel project (https://rtc-clone-proto.vercel.app), behind a Basic-Auth gate.
# Separate from the main app's Deploy workflow — this never auto-runs and touches
# only the prototype project. Run it from the Actions tab ("Run workflow", pick
# which prototype via the path input) or:
#   gh workflow run deploy-proto.yml -f prototype_path="docs/design/v3/standalone/Reactive Trader.html"
on:
  workflow_dispatch:
    inputs:
      prototype_path:
        description: "Path to the standalone prototype HTML to deploy"
        required: true
        default: "docs/design/v2/standalone/Reactive Trader.html"

concurrency:
  group: deploy-proto
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-proto:
    name: prototype → vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy chosen prototype (generate gate, copy HTML, deploy, smoke)
        # prototype_path is bound via env and passed as a quoted argument — never
        # interpolated into the script body — to avoid dispatch-input injection.
        env:
          SRC: ${{ inputs.prototype_path }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash deploy/prototype/deploy.sh "$SRC"
