name: Deploy Prototype

# On-demand deploy of the @rtc/client-prototype React port (the readable,
# self-contained port of the v2 design) to the rtc-clone-proto Vercel project
# (https://rtc-clone-proto.vercel.app), behind a Basic-Auth gate. Separate from
# the main app's Deploy workflow AND from the "Deploy Claude Design Prototype"
# workflow (which ships the hand-authored HTML mockup) — this never auto-runs and
# touches only the proto project. Run it from the Actions tab ("Run workflow") or:
#   gh workflow run deploy-proto.yml
#
# Requires the repo variable VERCEL_PROTO_PROJECT_ID (the rtc-clone-proto
# project's prj_… id) — see deploy/proto/README.md for one-time setup.
on:
  workflow_dispatch:

concurrency:
  group: deploy-proto
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-proto:
    name: client-prototype → vercel
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build @rtc/client-prototype, generate gate, deploy, smoke
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROTO_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash deploy/proto/deploy.sh
