name: CI

# Fast gates (typecheck, unit tests, build, the architecture + supply-chain
# grep/audit gates, visual diffs) plus the full e2e suite. The e2e job is the
# heavy one (real Cypress binary, Playwright Chromium, xvfb, the 10-way parallel
# orchestration in tests/scripts/run-all.ts); it runs alongside the fast jobs so
# it never slows them down.
#
# All third-party actions are pinned to immutable commit SHAs (with the human
# version in a trailing comment). Renovate (helpers:pinGitHubActionDigests in
# .github/renovate.json5) keeps the digests current.
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # pnpm is provisioned by Corepack from the `packageManager` pin; silence its
  # first-run download prompt so non-interactive CI never stalls.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  checks:
    name: typecheck · test · build · gates
    runs-on: ubuntu-latest
    env:
      # These checks don't exercise Cypress; skip its heavy binary download.
      # `allowBuilds` still permits the postinstall script — this just no-ops the
      # binary fetch, keeping the job fast.
      CYPRESS_INSTALL_BINARY: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # --frozen-lockfile fails if the lockfile is out of date, and under pnpm 11
      # it also enforces the supply-chain policy: the minimumReleaseAge cooldown
      # and the allowBuilds install-script allowlist. A PR that introduces a
      # too-fresh (<24h) dependency, an unvetted build script, or a stale lockfile
      # is rejected here.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format (Biome)
        run: pnpm exec biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests (unit + ui:contract)
        run: pnpm test

      # The ui:contract coverage gate over the whole src/ui surface (≥95%). It
      # runs the neutral sociable contract specs AND the co-located src/ui unit
      # tests, so the percentage reflects their true combined coverage.
      - name: UI contract coverage gate (≥95%)
        run: pnpm --filter @rtc/client-react test:ui:contract:coverage

      - name: Build
        run: pnpm build

      - name: Architecture + supply-chain gates (grep gates + pnpm audit --prod)
        run: pnpm --filter @rtc/tests gates

  visual:
    name: visual diffs
    runs-on: ubuntu-latest
    # Run inside the official Playwright image so chromium + fonts + OS libs are
    # byte-identical to where the goldens are generated. This eliminates the
    # cross-platform rendering diffs (sandbox/ubuntu) that fail toHaveScreenshot,
    # and makes the goldens a stable portability contract for any future UI
    # framework swap. Browsers are preinstalled in the image (PLAYWRIGHT_BROWSERS_PATH
    # is set by it), so no `playwright install` step is needed. The goldens are
    # regenerated in this SAME image via .github/workflows/update-visual-goldens.yml.
    # Tag must track the @playwright/test version in packages/client-react.
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      CYPRESS_INSTALL_BINARY: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Invoke through turbo (NOT `pnpm --filter`) so the task's declared
      # dependsOn ["^build"] runs first: the visual harness imports the
      # @rtc/domain / @rtc/shared workspace libs via their built dist/, which a
      # fresh checkout hasn't produced. A direct `pnpm --filter` call bypasses
      # turbo's graph and fails to resolve @rtc/domain.
      - name: Visual diffs (playwright-ct + playwright + vitest-browser)
        run: pnpm test:ui:visual

      # On a mismatch, publish the actual-vs-expected images so cross-platform
      # rendering diffs (sandbox goldens vs the ubuntu runner) can be inspected.
      - name: Upload visual diff report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-visual-report
          path: |
            packages/client-react/reports/
            packages/client-react/tests/ui/visual/**/__screenshots__/**/*-actual.png
            packages/client-react/tests/ui/visual/**/__screenshots__/**/*-diff.png
            packages/client-react/tests/ui/visual/**/__screenshots__/**/*-reference.png
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: e2e (browser · presenter · fullstack)
    runs-on: ubuntu-latest
    env:
      # The 2-vCPU runner can't sustain the 10-way parallel orchestration (it
      # starves the timing-sensitive WS smoke + cypress into timeouts). Cap the
      # pool to 2 suites at a time — slower wall-clock, but reliable. run-all.ts
      # defaults to fully parallel when this is unset (multi-core dev boxes).
      RTC_E2E_MAX_PARALLEL: "2"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # This job, unlike the fast ones, genuinely needs the Cypress binary, so we
      # do NOT set CYPRESS_INSTALL_BINARY=0. Cache it keyed on the lockfile (the
      # pinned cypress version lives there) so it isn't re-downloaded every run.
      - name: Cache the Cypress binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: Install dependencies (incl. Cypress binary)
        run: pnpm install --frozen-lockfile

      # The e2e browser suites run Playwright (cucumber-driven + raw) against
      # Chromium; install it from the @rtc/tests package (the one that launches it).
      - name: Install Playwright Chromium + OS deps
        run: pnpm --filter @rtc/tests exec playwright install --with-deps chromium

      # run-all.ts wraps each parallel Cypress suite in `xvfb-run -a` so the two
      # Cypress suites don't collide on the fixed X display :99. Provide xvfb.
      - name: Install xvfb (for parallel headless Cypress)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Invoke through turbo (root script = `turbo run test:e2e`, NOT
      # `pnpm --filter`) so the task's dependsOn ["build"] builds every workspace
      # lib first — the suites import @rtc/{domain,shared,client,server} via their
      # dist/. turbo then runs `pnpm gates` + the 10-way parallel orchestrator.
      # CI=true (set by GitHub) makes cucumber use parallel:1 + retry:2.
      - name: e2e suite (10 parallel suites)
        run: pnpm test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-report
          path: |
            tests/reports/
          if-no-files-found: ignore
          retention-days: 7
