name: CI

# Fast gates (typecheck, unit tests, build, the architecture + supply-chain
# grep/audit gates) plus the full e2e suite. The e2e job is the heavy one (real
# Cypress binary, Playwright Chromium, xvfb, the 12-way parallel orchestration in
# tests/scripts/run-all.ts — 6 non-browser suites + 6 browser suites, the last
# two of which are the Solid client's playwright/playwright-cucumber peers);
# it runs alongside the fast jobs so it never slows them down.
#
# The ~20-min visual-diff gate is DELIBERATELY NOT here: it runs post-merge only,
# in its own workflow (.github/workflows/visual.yml, triggered on push to main),
# so branch pushes / PRs are never blocked while the UI is churning. A post-merge
# failure on main is the signal to inspect → fix the regression or (if intended)
# regenerate the goldens. Restore it as a PR gate here once the UI stabilises.
#
# All third-party actions are pinned to immutable commit SHAs (with the human
# version in a trailing comment). Renovate (helpers:pinGitHubActionDigests in
# .github/renovate.json5) keeps the digests current.
on:
  pull_request:
  push:
    branches: [main]
  # Manual escape hatch (mirrors visual.yml): lets a branch re-verify when a
  # pull_request synchronize event fails to materialize a run.
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # pnpm is provisioned by Corepack from the `packageManager` pin; silence its
  # first-run download prompt so non-interactive CI never stalls.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  checks:
    name: typecheck · test · build · gates
    runs-on: ubuntu-latest
    env:
      # These checks don't exercise Cypress; skip its heavy binary download.
      # `allowBuilds` still permits the postinstall script — this just no-ops the
      # binary fetch, keeping the job fast.
      CYPRESS_INSTALL_BINARY: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # --frozen-lockfile fails if the lockfile is out of date, and under pnpm 11
      # it also enforces the supply-chain policy: the minimumReleaseAge cooldown
      # and the allowBuilds install-script allowlist. A PR that introduces a
      # too-fresh (<24h) dependency, an unvetted build script, or a stale lockfile
      # is rejected here.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format (Biome)
        run: pnpm exec biome ci .

      - name: ESLint (AST rules)
        run: pnpm lint:eslint

      - name: Custom ESLint rule tests (RuleTester)
        run: pnpm test:rules

      - name: CSS lint (stylelint)
        run: pnpm lint:css

      - name: Workflow lint (actionlint)
        run: pnpm lint:actions

      - name: Docs link check (files + anchors)
        run: pnpm check:doc-links

      - name: Presenter manifest drift (web ↔ React Native)
        run: pnpm check:manifest-drift

      - name: Playwright container image tag drift (single-source pin)
        run: pnpm check:image-tag-drift

      - name: Lint-warnings ledger drift (docs/lint-warnings.md)
        run: pnpm check:lint-warnings-drift

      - name: Version consistency (manypkg + syncpack)
        run: pnpm check:versions

      - name: Workspace script coverage (every package wired to the gates)
        run: pnpm check:scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests (unit)
        run: pnpm test

      - name: Pages tooling unit tests
        run: pnpm --filter @rtc/tests test:pages

      # The ui:contract coverage gate over the whole src/ui surface (≥95%). It
      # runs the neutral sociable contract specs AND the co-located src/ui unit
      # tests, so the percentage reflects their true combined coverage.
      - name: UI contract coverage gate (≥95%)
        run: pnpm --filter @rtc/client-react test:ui:contract:coverage

      # Same gate, same neutral specs, second framework: proves the Solid port
      # carries the react coverage bar (replaceability §8.1 full-parity).
      # Branches gate at 85 (not 95) — Solid's compiled reactive-effect guards
      # inflate v8's branch denominator; rationale in the coverage config.
      - name: UI contract coverage gate — solid (≥95%, branches ≥85%)
        run: pnpm --filter @rtc/client-solid test:ui:contract:coverage

      - name: Build
        run: pnpm build

      - name: Prod /devtools/ bundle check
        run: pnpm check:devtools-dist

      - name: Expo bundle smoke (Metro monorepo resolution)
        # KNOWN ISSUE (tracked in docs/STATUS.md): react-native-worklets@0.10.0's
        # Babel plugin throws `Cannot read properties of undefined (reading
        # 'length')` while transforming reanimated@4.5.0's Easing.ts ONLY on x86
        # Linux (this runner). It reproduces on the exact Expo-SDK-57-blessed pair
        # (reanimated 4.5.0 + worklets 0.10.0, single version, plugin==runtime,
        # uniform Babel 7); arm64 macOS bundles cleanly and the app builds/runs on
        # the iOS simulator (verified on-device). Tolerate ONLY this signature so
        # the gate still catches every other bundle-resolution break (e.g. the
        # past babel-preset-expo `getDevServer` crash). Remove once worklets ships
        # an x86 fix (or an Expo SDK bump lands).
        run: |
          set +e
          out="$(pnpm --filter @rtc/client-react-native export 2>&1)"
          code=$?
          printf '%s\n' "$out"
          if [ "$code" -eq 0 ]; then exit 0; fi
          if printf '%s' "$out" | grep -qF "[Worklets] Babel plugin exception: Cannot read properties of undefined (reading 'length')"; then
            echo "::warning title=Known worklets x86 bundle crash::Tolerated the known react-native-worklets@0.10.0 x86 Babel-plugin crash on reanimated Easing.ts (see docs/STATUS.md). arm64 builds/runs fine."
            exit 0
          fi
          echo "::error title=Expo bundle smoke failed::Unexpected bundle failure (NOT the tolerated worklets x86 issue)."
          exit "$code"

      - name: Dead code (knip)
        run: pnpm lint:dead

      - name: Dependency graph (cycles + layering)
        run: pnpm check:deps

      - name: ESLint (type-aware rules)
        run: pnpm lint:eslint:types

      - name: Architecture + supply-chain gates (grep gates + pnpm audit --prod)
        run: pnpm --filter @rtc/tests gates

  e2e:
    name: e2e (browser · presenter · fullstack)
    runs-on: ubuntu-latest
    env:
      # The 2-vCPU runner can't sustain the 12-way parallel orchestration (it
      # starves the timing-sensitive WS smoke + cypress into timeouts). Cap the
      # pool to 2 suites at a time — slower wall-clock, but reliable. run-all.ts
      # defaults to fully parallel when this is unset (multi-core dev boxes).
      RTC_E2E_MAX_PARALLEL: "2"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # This job, unlike the fast ones, genuinely needs the Cypress binary, so we
      # do NOT set CYPRESS_INSTALL_BINARY=0. Cache it keyed on the lockfile (the
      # pinned cypress version lives there) so it isn't re-downloaded every run.
      - name: Cache the Cypress binary
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: Install dependencies (incl. Cypress binary)
        run: pnpm install --frozen-lockfile

      # The e2e browser suites run Playwright (cucumber-driven + raw) against
      # Chromium; install it from the @rtc/tests package (the one that launches it).
      - name: Install Playwright Chromium + OS deps
        run: pnpm --filter @rtc/tests exec playwright install --with-deps chromium

      # run-all.ts wraps each parallel Cypress suite in `xvfb-run -a` so the two
      # Cypress suites don't collide on the fixed X display :99. Provide xvfb.
      - name: Install xvfb (for parallel headless Cypress)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Invoke through turbo (root script = `turbo run test:e2e`, NOT
      # `pnpm --filter`) so the task's dependsOn ["build"] builds every workspace
      # lib first — the suites import @rtc/{domain,shared,client,server} via their
      # dist/. turbo then runs `pnpm gates` + the 12-way parallel orchestrator.
      #
      # RTC_E2E_SKIP_CYPRESS=1 excludes the two Cypress suites from the CI GATE.
      # Cypress's command-queue model is fundamentally mismatched with this app's
      # real RxJS timers + Promise-shaped scenario contracts, producing a long
      # tail of CI-timing-only flakes (dropped events, detached-element re-render
      # races) that no longer reproduce locally — chasing each via ~15-min CI
      # cycles was pure waste, and retries only masked them. The Playwright suites
      # run the SAME 48 scenarios deterministically at retries:0 and are the gate.
      # Cypress remains fully runnable locally (`pnpm --filter @rtc/tests
      # test:browser:cypress[-cucumber]`) as the deliberate framework-comparison
      # reference — see tests/STRATEGY.md §7. All known Cypress flakes are still
      # fixed at source; this only stops undiscovered ones from blocking merges.
      - name: e2e suite (Playwright + presenter + fullstack; Cypress excluded from the gate)
        run: RTC_E2E_SKIP_CYPRESS=1 pnpm test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-report
          path: |
            tests/reports/
          if-no-files-found: ignore
          retention-days: 7
