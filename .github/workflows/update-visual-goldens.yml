name: Update visual goldens

# Manually-triggered (workflow_dispatch) regeneration of the visual golden
# screenshots, rendered INSIDE the same Playwright container the `visual` job in
# ci.yml uses — so the goldens match CI byte-for-byte and stop failing on
# cross-platform font/sub-pixel differences. Keep the container tag in sync with
# the `visual` job in ci.yml.
#
# Two modes, chosen by the `scenario_pattern` dispatch input:
#   - EMPTY (default) → full refresh: wipe the canonical react/ trees, then
#     re-render all ~1222 scenarios × 3 tiers.
#   - SET (e.g. `aurora`, `credit/new-rfq-open`) → targeted refresh: SKIP the
#     wipe and pass the pattern to each runner (playwright `-g`, vitest `-t`), so
#     only the matching goldens are re-rendered — a one-scenario change costs ~1
#     minute instead of ~30, and can't drag in unrelated in-flight golden work.
#
# It then AUTO-COMMITS the regenerated goldens straight to the dispatched branch
# (scoped to the canonical react/ trees only — never the vitest failure-debris
# dir or a partial react-local/ set) using the workflow's GITHUB_TOKEN, so there
# is no artifact → download → cherry-pick → commit round-trip. The artifact is
# still uploaded as a fallback. The commit is `[skip ci]` (and GITHUB_TOKEN
# pushes don't retrigger workflows anyway), so it never loops.
#
# SCOPE: refreshes ONLY the canonical x86 `react/` set (the CI-enforced baseline)
# — react-only BY DESIGN. The goldens are react-owned; the Solid client
# (@rtc/client-solid) never gets its own set — its visual tiers assert the SAME
# scenarios against these react goldens (see visual.yml), so regenerating here is
# sufficient for both clients. It does NOT touch the per-arch
# `react-local/<platform>-<arch>/` sets used for local feedback — those never
# match the x86 pixels and no CI runner reproduces them. After an intentional UI
# change you must ALSO regenerate your local set on your own machine and commit
# it (see packages/client-react/tests/ui/visual/ADR-001-visual-diff-tooling.md,
# "Cross-platform pixel drift").
on:
  workflow_dispatch:
    inputs:
      scenario_pattern:
        description: >-
          Optional test-title filter (playwright -g / vitest -t). Empty = full
          refresh (wipe + re-render all). Set = targeted refresh of only the
          matching scenarios (no wipe). e.g. "aurora", "credit/new-rfq-open".
        required: false
        default: ""

# Needed for the auto-commit step to push regenerated goldens to the branch.
permissions:
  contents: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  CYPRESS_INSTALL_BINARY: "0"

jobs:
  update:
    name: regenerate goldens (Playwright container)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      SCENARIO_PATTERN: ${{ inputs.scenario_pattern }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The runners are invoked directly (bypassing turbo), so build the workspace
      # libs first or vite can't resolve @rtc/domain.
      - name: Build workspace libraries
        run: pnpm build

      # FULL refresh only: `--update` writes new files but never deletes stale
      # ones, so wipe the canonical react/ trees first or an orphaned flat golden
      # (or a retired spec dir) would survive. A TARGETED refresh (pattern set)
      # must NOT wipe — it re-renders only the matched goldens and leaves the rest.
      - name: Clean canonical react/ goldens before full regen
        if: ${{ inputs.scenario_pattern == '' }}
        run: |
          rm -rf packages/ui-contract/goldens/playwright-ct/__screenshots__/react
          rm -rf packages/ui-contract/goldens/playwright/__screenshots__/react
          rm -rf packages/ui-contract/goldens/vitest-browser/__screenshots__/react

      # Re-render the canonical x86 react/ goldens for all three runners — the full
      # theme matrix (5 skins × dark/light) unless SCENARIO_PATTERN narrows it.
      # These are the exact proven pnpm :update scripts (unchanged), so the
      # plain-playwright tier's vite webServer spawns in the same context it always
      # has. The filter is applied INSIDE each config from $SCENARIO_PATTERN
      # (playwright `grep`, vitest `testNamePattern`) rather than via CLI args,
      # because `pnpm run <script> -- -g X` double-dashes the arg and playwright
      # ignores it. Empty pattern = no filter = full matrix.
      - name: Regenerate playwright-ct goldens
        run: pnpm --filter @rtc/client-react test:ui:visual:playwright-ct:react:update

      - name: Regenerate playwright goldens
        run: pnpm --filter @rtc/client-react test:ui:visual:playwright:react:update

      - name: Regenerate vitest-browser goldens
        run: pnpm --filter @rtc/client-react test:ui:visual:vitest-browser:react:update

      # Commit the regenerated goldens straight to the dispatched branch. Scope the
      # stage to the canonical react/ trees ONLY — a bare `git add` would also catch
      # the vitest failure-debris dir (…/__screenshots__/visual.spec.tsx/) or a
      # partial react-local/ set. The grep guard hard-fails if anything outside
      # react/ somehow staged.
      - name: Commit regenerated react/ goldens to the branch
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/ui-contract/goldens/playwright-ct/__screenshots__/react \
            packages/ui-contract/goldens/playwright/__screenshots__/react \
            packages/ui-contract/goldens/vitest-browser/__screenshots__/react
          if git diff --cached --name-only | grep -v '__screenshots__/react/' | grep -q .; then
            echo "Refusing to commit paths outside the canonical react/ trees:"
            git diff --cached --name-only | grep -v '__screenshots__/react/'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
          else
            MSG="test(visual): regenerate react/ goldens"
            if [ -n "$SCENARIO_PATTERN" ]; then
              MSG="$MSG (pattern: $SCENARIO_PATTERN)"
            fi
            git commit -m "$MSG [skip ci]"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi

      - name: Upload regenerated goldens (fallback artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-goldens
          path: |
            packages/ui-contract/goldens/playwright-ct/__screenshots__/react/
            packages/ui-contract/goldens/playwright/__screenshots__/react/
            packages/ui-contract/goldens/vitest-browser/__screenshots__/react/
          if-no-files-found: error
          retention-days: 7
