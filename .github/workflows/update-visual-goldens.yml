name: Update visual goldens

# Manually-triggered (workflow_dispatch) regeneration of the visual golden
# screenshots, rendered INSIDE the same Playwright container the `visual` job in
# ci.yml uses — so the goldens match CI byte-for-byte and stop failing on
# cross-platform font/sub-pixel differences. It does NOT commit; it uploads the
# regenerated __screenshots__ as an artifact for a human to download, review, and
# commit. Run this whenever the UI intentionally changes or the container tag is
# bumped. Keep the container tag in sync with the `visual` job in ci.yml.
#
# SCOPE: this refreshes ONLY the canonical x86 `react/` set (the CI-enforced
# baseline). It does NOT touch the per-arch `react-local/<platform>-<arch>/`
# sets used for local feedback — those never match the x86 pixels and no CI
# runner reproduces them. After an intentional UI change you must ALSO regenerate
# your local set on your own machine and commit it:
#   pnpm test:ui:visual:playwright-ct:react:update &&
#   pnpm test:ui:visual:playwright:react:update &&
#   pnpm test:ui:visual:vitest-browser:react:update
# Otherwise `pnpm test:ui:visual` stays red locally even once CI is green. See
# packages/client-react/tests/ui/visual/ADR-001-visual-diff-tooling.md ("Cross-platform pixel drift").
on:
  workflow_dispatch:

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  CYPRESS_INSTALL_BINARY: "0"

jobs:
  update:
    name: regenerate goldens (Playwright container)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The :update scripts call `playwright test` directly (bypassing turbo), so
      # build the workspace libs first or vite can't resolve @rtc/domain.
      - name: Build workspace libraries
        run: pnpm build

      # Re-render and overwrite the canonical x86 `react/` goldens for all three
      # runners (browsers are preinstalled in the image at PLAYWRIGHT_BROWSERS_PATH).
      - name: Regenerate playwright-ct goldens
        run: pnpm --filter @rtc/client-react test:ui:visual:playwright-ct:react:update

      - name: Regenerate playwright goldens
        run: pnpm --filter @rtc/client-react test:ui:visual:playwright:react:update

      - name: Regenerate vitest-browser goldens
        run: pnpm --filter @rtc/client-react test:ui:visual:vitest-browser:react:update

      - name: Upload regenerated goldens
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-goldens
          path: |
            packages/client-react/tests/ui/visual/playwright-ct/__screenshots__/
            packages/client-react/tests/ui/visual/playwright/__screenshots__/
            packages/client-react/tests/ui/visual/vitest-browser/__screenshots__/
          if-no-files-found: error
          retention-days: 7
