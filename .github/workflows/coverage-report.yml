# .github/workflows/coverage-report.yml
name: Coverage Report

# On-demand only. Run from the GitHub mobile app: Actions -> Coverage Report ->
# Run workflow -> pick any branch. Produces TWO views of the same run:
#   1. A job summary (sanitized markdown: test pass/fail + per-package coverage
#      with collapsible per-file diff snippets). Readable on mobile web from the
#      run's Summary page.
#   2. The FULL istanbul HTML report (colored, click-through, file-by-file) for
#      all five tiers, published to GitHub Pages at a stable URL you can open
#      and browse immediately on any device — no download, no unzip. The repo is
#      public, so the report (which shows source lines) leaks nothing new.
on:
  workflow_dispatch:

concurrency:
  group: pages-write
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  coverage:
    name: coverage + untested lines
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Same Playwright image as the `visual` job: the client visual coverage tier
    # renders in a real browser; the Node-based tiers run fine here too. Tag must
    # track @playwright/test in packages/client-react.
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      CYPRESS_INSTALL_BINARY: "0" # e2e is out of scope here
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm from packageManager)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc-built libs (domain/shared/server) + the visual harness import workspace
      # libs via their dist/; a fresh checkout has none. Build once up front so the
      # direct `pnpm --filter ... test:*coverage` calls below resolve them.
      - name: Build workspace
        run: pnpm build

      # Each tier emits istanbul-format coverage-final.json (--coverage.reporter=json)
      # for the markdown summary AND a browsable html report (--coverage.reporter=html)
      # for Pages, plus a vitest json test-results file (--reporter=json). The CLI
      # --coverage.reporter flags REPLACE the config's reporter array, so html must be
      # named explicitly here even for tiers whose config already lists it.
      # continue-on-error so a tier below its threshold gate (contract's 95%) does NOT
      # abort the report — surfacing gaps is the whole point.
      #
      # We invoke vitest via `pnpm exec` rather than `pnpm <script> -- <flags>`:
      # pnpm forwards trailing args with the literal `--` separator preserved
      # (`vitest run --coverage -- <flags>`), and vitest treats everything after `--`
      # as positional test-name FILTERS, not flags — so the reporter overrides are
      # silently ignored and no JSON is written. `exec` passes the flags directly.
      # The replicated per-tier args mirror the package.json coverage scripts.
      - name: Coverage — domain
        continue-on-error: true
        run: >
          pnpm --filter @rtc/domain exec vitest run --coverage
          --coverage.reporter=json --coverage.reporter=html
          --reporter=default --reporter=json
          --outputFile.json=reports/unit/test-results.json

      - name: Coverage — server
        continue-on-error: true
        run: >
          pnpm --filter @rtc/server exec vitest run --coverage
          --coverage.reporter=json --coverage.reporter=html
          --reporter=default --reporter=json
          --outputFile.json=reports/unit/test-results.json

      - name: Coverage — client app
        continue-on-error: true
        run: >
          pnpm --filter @rtc/client-react exec vitest run src/app
          -c vitest.app.coverage.config.ts --coverage
          --coverage.reporter=json --coverage.reporter=html
          --reporter=default --reporter=json
          --outputFile.json=reports/app/test-results.json

      - name: Coverage — client UI (contract tier)
        continue-on-error: true
        run: >
          pnpm --filter @rtc/client-react exec vitest run
          -c tests/ui/contract/vitest.coverage.config.ts --coverage
          --coverage.reporter=json --coverage.reporter=html
          --reporter=default --reporter=json
          --outputFile.json=reports/ui/contract/test-results.json

      - name: Coverage — client UI (visual tier)
        continue-on-error: true
        run: >
          pnpm --filter @rtc/client-react exec vitest run
          -c tests/ui/visual/vitest-browser/vitest-browser.coverage.config.ts --coverage
          --coverage.reporter=json --coverage.reporter=html
          --reporter=default --reporter=json
          --outputFile.json=reports/ui/visual/test-results.json

      - name: Render report to job summary
        run: pnpm --filter @rtc/tests coverage:report

      # Stitch the five tiers' istanbul HTML into one Pages site with a landing
      # index. Tiers that fell over (continue-on-error) simply produce no html dir
      # and are listed as "not generated" rather than breaking the build.
      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          site="_site"
          rm -rf "$site"
          mkdir -p "$site"

          # display-name | url-slug | istanbul html directory
          tiers=(
            "domain|domain|packages/domain/reports/unit/coverage"
            "server|server|packages/server/reports/unit/coverage"
            "client/app|client-app|packages/client-react/reports/app/coverage"
            "client/ui (contract)|ui-contract|packages/client-react/reports/ui/contract/coverage"
            "client/ui (visual)|ui-visual|packages/client-react/reports/ui/visual/coverage"
          )

          links=""
          for entry in "${tiers[@]}"; do
            IFS='|' read -r name slug dir <<<"$entry"
            if [ -f "$dir/index.html" ]; then
              mkdir -p "$site/$slug"
              cp -R "$dir/." "$site/$slug/"
              links="${links}      <li><a href=\"./$slug/index.html\">${name}</a></li>"$'\n'
            else
              links="${links}      <li>${name} — <em>not generated (tier did not run)</em></li>"$'\n'
            fi
          done

          generated="$(date -u '+%Y-%m-%d %H:%M UTC')"
          branch="${GITHUB_REF_NAME:-local}"
          sha="${GITHUB_SHA:-local}"
          short_sha="${sha:0:7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          cat > "$site/index.html" <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Coverage Report — ${branch} @ ${short_sha}</title>
            <style>
              :root { color-scheme: light dark; }
              body { font: 16px/1.5 system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
              h1 { font-size: 1.4rem; }
              ul { padding-left: 1.2rem; } li { margin: .4rem 0; }
              a { color: #0969da; } em { opacity: .6; }
              .meta { opacity: .7; font-size: .9rem; }
              footer { margin-top: 2rem; font-size: .85rem; opacity: .7; }
            </style>
          </head>
          <body>
            <h1>Coverage Report</h1>
            <p class="meta">${branch} @ ${short_sha} · generated ${generated}</p>
            <p>Full istanbul HTML report per tier — tap a tier to browse line-by-line coverage:</p>
            <ul>
          ${links}    </ul>
            <footer>
              <a href="${run_url}">↩ workflow run</a> ·
              <a href="${run_url}#summary">markdown summary (diff view)</a>
            </footer>
          </body>
          </html>
          HTML

          echo "Assembled Pages site:"
          ls -1 "$site"

      - name: Publish coverage to gh-pages
        run: |
          rm -rf _stage
          mkdir -p _stage
          cp -R _site _stage/coverage
          node scripts/pages/publish-to-pages.mjs --source _stage --message "publish coverage @ ${GITHUB_SHA}"

      - name: Live report link
        run: |
          url="https://bettersoftware-io.github.io/ReactiveTraderCloudClone/coverage/"
          echo "Live HTML coverage report: $url"
          echo "::notice title=Coverage report (live HTML)::Browse the full report → $url"
