name: Deploy

# Production deploy of the WS server (Fly.io) and the client (Vercel). Runs
# ON DEMAND ONLY (manual trigger) — a merge to main does NOT auto-deploy. Start
# a deploy from the Actions tab ("Run workflow") or `gh workflow run deploy.yml`.
# The two jobs are independent — the Fly URL is a stable constant baked into the
# client at build time, so the client build does not wait on the server deploy.
# Both must go green.
#
# "the client" here is @rtc/client-react ONLY, BY DESIGN — the build command is
# pinned in the root vercel.json (`--filter=@rtc/client-react`). @rtc/client-solid
# is deployed separately by the `Deploy Solid` workflow (deploy-solid.yml), which
# ships it to rtc-clone-solid.vercel.app against this same shared Fly WS server.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-server:
    name: server → fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      # AUTH_SECRET (HMAC signing secret) and AUTH_USERS (the "user:pass,..."
      # credential roster) are Fly secrets set BY HAND (`flyctl secrets set`) —
      # this deploy PAT/token can't set secrets, only deploy code. The old
      # Vercel-side SITE_PASSWORD Basic-Auth wall and the shared WS_ACCESS_TOKEN
      # / VITE_WS_TOKEN query-string gate are gone: the server now validates
      # real per-user credentials (POST /login) and issues a signed token that
      # gates the WS upgrade (see docs/env-files.md, packages/server/README.md).
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke — /health returns 200
        run: curl -fsS https://rtc-clone-server.fly.dev/health

  deploy-client:
    name: client → vercel
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel bakes VITE_SERVER_URL from pulled env)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # If VITE_SERVER_URL is not inlined, the client silently falls back to the
      # in-browser simulator and never opens a WebSocket — no error, just wrong.
      # (Root cause once: turbo strict-env mode filtered the undeclared VITE_*
      # vars out of the vite build. See turbo.json `build.env`.) Fail loudly here
      # BEFORE deploying, rather than ship a simulator build to production.
      - name: Guard — server URL was inlined into the client bundle
        run: |
          if ! grep -rq "rtc-clone-server.fly.dev" .vercel/output/static; then
            echo "::error::VITE_SERVER_URL absent from build output — client would run the simulator with no WebSocket. Check turbo.json build.env and the Vercel Production env vars."
            exit 1
          fi
          echo "OK: Fly WS URL is present in the built client bundle."

      - name: Deploy prebuilt
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # The old Vercel Basic-Auth wall (SITE_PASSWORD, 401-gated) is gone — the
      # deployed SPA is reachable directly and gates access via real login
      # (POST /login against the Fly server), not a static edge password.
      - name: Smoke — deployed client responds
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}")
          echo "Got HTTP $code"
          test "$code" = "200"
