name: Visual diffs

# The full theme-matrix visual-diff gate (5 skins × dark/light × 3 tiers,
# ~1222 scenarios/tier, all serial — ~20 min) run for BOTH clients: react (which
# owns the committed goldens) and solid (which asserts the same scenarios
# against react's goldens, owning none of its own) — 6 tier-runs total. It used
# to live in ci.yml as a PR gate but that blocked every branch push while the UI
# was still churning. It now runs POST-MERGE ONLY: on push to main (i.e. right
# after a PR merges) and on manual dispatch. A red run here is the signal to
# inspect the diff and either fix the regression or — if the change was
# intentional — regenerate the goldens via .github/workflows/update-visual-goldens.yml
# (react-only; see that workflow). It does NOT gate merges; move it back into
# ci.yml (as a PR job) once the UI stabilises.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Verify every main commit — don't let a newer merge cancel an in-flight run, or a
# regression could slip past unverified. (Contrast ci.yml, which cancels stale
# branch runs.) Serialise per-ref so runs don't stack up.
concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: false

env:
  # pnpm is provisioned by Corepack from the `packageManager` pin; silence its
  # first-run download prompt so non-interactive CI never stalls.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  visual:
    name: visual diffs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Run inside the official Playwright image so chromium + fonts + OS libs are
    # byte-identical to where the goldens are generated. This eliminates the
    # cross-platform rendering diffs (sandbox/ubuntu) that fail toHaveScreenshot,
    # and makes the goldens a stable portability contract for any future UI
    # framework swap. Browsers are preinstalled in the image (PLAYWRIGHT_BROWSERS_PATH
    # is set by it), so no `playwright install` step is needed. The goldens are
    # regenerated in this SAME image via .github/workflows/update-visual-goldens.yml.
    # Tag must track the @playwright/test version in packages/client-react.
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      # Run the three visual runners SERIALLY, matching update-visual-goldens.yml
      # (which regenerates each tier in its own sequential step). run-all.ts
      # defaults to fully-concurrent under CI, and 3-tier CPU contention on the
      # 2-core runner lets Playwright's stable-frame check capture one frame
      # early — goldens generated unloaded then verified under load drift by
      # ±1px / glyph metrics on text-dense captures (same class as the
      # playwright-ct workers:1 lesson, one level up).
      RTC_VISUAL_MAX_PARALLEL: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Enable Corepack (pins pnpm 11.5.2 from the packageManager field)
        run: npm install -g corepack@0.35.0 && corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache the pnpm content-addressable store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Invoke through turbo (NOT `pnpm --filter`) so the task's declared
      # dependsOn ["^build"] runs first: the visual harness imports the
      # @rtc/domain / @rtc/shared workspace libs via their built dist/, which a
      # fresh checkout hasn't produced. A direct `pnpm --filter` call bypasses
      # turbo's graph and fails to resolve @rtc/domain. `--filter=@rtc/...`
      # HERE is turbo's own package-scoping flag (forwarded through the root
      # `test:ui:visual` script to `turbo run test:ui:visual`), not pnpm's —
      # it still goes through turbo, so dependsOn still runs first.
      #
      # React and solid run as TWO separate steps (not one unfiltered
      # `pnpm test:ui:visual`, which would let turbo schedule both packages'
      # browser stacks concurrently) — each tier stands up its own
      # Chromium + Vite dev server(s), and this job's RTC_VISUAL_MAX_PARALLEL=1
      # only bounds a single package's OWN run-all.ts, not cross-package turbo
      # scheduling. Splitting into two filtered, sequential steps keeps the
      # whole job's browser-stack concurrency at exactly one, matching the
      # same oversubscription lesson as RTC_VISUAL_MAX_PARALLEL and the CT
      # workers:1 pin.
      # Full theme matrix (5 skins × dark/light, ~1222 scenarios × 3 tiers per
      # package, all serial per RTC_VISUAL_MAX_PARALLEL=1) makes each step a
      # long run (~20 min) — which is exactly why this job is post-merge and
      # not a PR gate.
      - name: Visual diffs — react (playwright-ct + playwright + vitest-browser)
        id: visual_react
        continue-on-error: true
        run: pnpm test:ui:visual --filter=@rtc/client-react

      # Solid owns NO goldens of its own — every scenario here asserts against
      # react's COMMITTED goldens (see each solid tier's config header). A red
      # run here means either a solid-side rendering/framing regression or a
      # react-side golden that hasn't been regenerated yet for a recent
      # scenario change — never a signal to add a solid golden.
      - name: Visual diffs — solid (playwright-ct fallback + playwright + vitest-browser)
        id: visual_solid
        continue-on-error: true
        run: pnpm test:ui:visual --filter=@rtc/client-solid

      # Build the browsable /visual/ report from whatever diff images the two
      # steps above produced (none on a green run → an "all green" page), then
      # publish it to the gh-pages /visual/ subtree (disjoint from /coverage/;
      # publish-to-pages.mjs's rebase loop serialises concurrent writers). Runs
      # on pass and fail alike so a green run overwrites a stale red report.
      - name: Build visual report site
        if: always()
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          rm -rf _stage
          mkdir -p _stage/visual
          FAILED=""
          [ "${{ steps.visual_react.outcome }}" = "failure" ] && FAILED="$FAILED client-react"
          [ "${{ steps.visual_solid.outcome }}" = "failure" ] && FAILED="$FAILED client-solid"
          node scripts/pages/build-visual-report.mjs \
            --out _stage/visual \
            --react packages/client-react \
            --solid packages/client-solid \
            --branch "${GITHUB_REF_NAME}" --sha "${GITHUB_SHA}" --run-url "$RUN_URL" \
            --failed "$FAILED"

      - name: Publish visual report to gh-pages
        if: always()
        run: |
          # The Playwright container checkout is owned by a different user than
          # git runs as; clear the dubious-ownership guard before the worktree
          # add inside publish-to-pages (mirrors coverage-report.yml).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          node scripts/pages/publish-to-pages.mjs --source _stage --message "publish visual report @ ${GITHUB_SHA}"

      - name: Live report link
        if: always()
        run: |
          url="https://bettersoftware-io.github.io/ReactiveTraderCloudClone/visual/"
          echo "Live visual diff report: $url"
          echo "::notice title=Visual diff report (live HTML)::Browse the report → $url"

      # On a mismatch, publish the actual-vs-expected images so the regression (or
      # an intended change awaiting golden regen) can be inspected. React's three
      # tiers and solid's playwright/playwright-ct tiers all resolve their failure
      # debris (-actual/-diff) next to the golden they compared against, under the
      # shared packages/ui-contract/goldens/ tree — the glob below covers that.
      # Solid's vitest-browser tier is the one exception: it keeps its diffs local,
      # under its own tests/ui/visual/vitest-browser/__diffs__/ (see
      # scripts/pages/build-visual-report.mjs's scanPackage doc comment).
      - name: Upload visual diff report on failure
        if: ${{ always() && (steps.visual_react.outcome == 'failure' || steps.visual_solid.outcome == 'failure') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-visual-report
          path: |
            packages/client-react/reports/
            packages/ui-contract/goldens/**/__screenshots__/**/*-{actual,diff,reference}.png
            packages/client-solid/reports/
          if-no-files-found: ignore
          retention-days: 7

      # continue-on-error above lets both clients run and the report publish even
      # on failure; re-assert the real result here so the post-merge signal (and
      # this job's status) is still red when any tier failed.
      - name: Gate — fail if any visual tier failed
        if: always()
        run: |
          if [ "${{ steps.visual_react.outcome }}" = "failure" ] || [ "${{ steps.visual_solid.outcome }}" = "failure" ]; then
            echo "::error title=Visual diffs failed::One or more tiers failed — see the published report."
            exit 1
          fi
          echo "All visual tiers passed."
