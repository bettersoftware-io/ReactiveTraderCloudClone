# Dependabot configuration — SECURITY UPDATES ONLY.
#
# Routine version-bump PRs are disabled (open-pull-requests-limit: 0) because this
# repo has no CI yet to validate them — opening unvalidated bump PRs would just be
# noise. Dependabot *security* updates (PRs that patch known CVEs) are enabled at
# the repository level (Settings → Code security) and are NOT capped by the limit
# below, so vulnerability fixes still flow.
#
# When CI lands, raise the limit to turn on gated routine updates, and add a
# `cooldown:` block mirroring the pnpm `minimumReleaseAge` cooldown in
# pnpm-workspace.yaml so the bot won't even propose a too-fresh release.
version: 2
updates:
  - package-ecosystem: "npm" # also covers pnpm workspaces
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
