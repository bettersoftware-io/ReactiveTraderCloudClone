# Dependabot configuration — SECURITY UPDATES ONLY.
#
# Routine version-bump PRs are disabled here (open-pull-requests-limit: 0) and
# stay disabled on purpose: routine bumps (and GitHub Action digest updates) are
# owned by Renovate (.github/renovate.json5), which applies the supply-chain
# cooldown. Running both bots on routine updates would just open duplicate PRs.
#
# Dependabot's role is narrow and complementary: *security* updates (PRs that
# patch known CVEs), enabled at the repository level (Settings → Code security).
# Those are NOT capped by the limit below, so vulnerability fixes still flow, and
# Renovate's own vulnerability handling is disabled so the two never overlap.
version: 2
updates:
  - package-ecosystem: "npm" # also covers pnpm workspaces
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
